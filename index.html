<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Ranking Bolão</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <div class="premio-card">
      <span class="trofeu">🏆</span>
      <div>
        <small>Prêmio atual</small>
        <strong id="premioTotal">R$ 0,00</strong>
      </div>
    </div>

    <div class="topo">
      <img src="img/logo.png" alt="Logo do bolão" class="logo">

      <div>
        <h1>Ranking do Bolão</h1>
        <p>Copa do Mundo 2026</p>
      </div>
    </div>

    <div class="atualizacao" id="ultimaAtualizacao">
      Carregando ranking...
    </div>

    <section class="ranking-header">
      <span>Posição</span>
      <span>Palpiteiro</span>
      <span>Pontos</span>
    </section>

    <section id="ranking"></section>

  </main>

  <script src="script.js"></script>
</body>
</html>
